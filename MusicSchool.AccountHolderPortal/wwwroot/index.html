<head>

    <base href="/" />

    <style>
        /* ── Status chip palette (mirrors MusicSchool.Web) ─────── */
        .status-pending  { background-color: #FFF8E1 !important; color: #F57F17 !important; }
        .status-paid     { background-color: #E8F5E9 !important; color: #2E7D32 !important; }
        .status-overdue  { background-color: #FFEBEE !important; color: #C62828 !important; }
        .status-void     { background-color: #ECEFF1 !important; color: #546E7A !important; }

        /* ── Aging band cards ───────────────────────────────────── */
        .aging-card       { border-left: 4px solid #F3D395; }
        .aging-card-warn  { border-left: 4px solid #FFB74D; }
        .aging-card-alert { border-left: 4px solid #EF9A9A; }
        .aging-card-crit  { border-left: 4px solid #C62828; }
