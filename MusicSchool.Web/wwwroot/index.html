<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music School</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#F0F2F5;">
            <div style="text-align:center;">
                <div style="width:48px;height:48px;border:4px solid #F3D395;border-top-color:#78797A;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
                <p style="color:#78797A;font-family:Roboto,sans-serif;">Loading Music School...</p>
            </div>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        window.googleAuth = {
            initialize: function (clientId, dotNetHelper) {
                google.accounts.id.initialize({
                    client_id: clientId,
                    callback: function (response) {
                        dotNetHelper.invokeMethodAsync('HandleCredential', response.credential);
                    }
                });
            },
            renderButton: function (elementId) {
                google.accounts.id.renderButton(
                    document.getElementById(elementId),
                    { theme: 'outline', size: 'large', width: 280 }
                );
                google.accounts.id.prompt();
            },
            signOut: function () {
                google.accounts.id.disableAutoSelect();
            }
        };
    </script>
</body>
</html>
